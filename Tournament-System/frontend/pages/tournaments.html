<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Tournaments</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

<header class="header">

    <div class="container">

        <h1>Tournament Registration System</h1>

        <p>Tournament Management</p>

    </div>

</header>

<nav class="navbar">

    <ul>

        <li><a href="../index.html">Dashboard</a></li>

        <li><a href="players.html">Players</a></li>

        <li><a class="active"
               href="tournaments.html">Tournaments</a></li>

        <li><a href="register.html">Registration</a></li>

        <li><a href="scores.html">Scores</a></li>

        <li><a href="leaderboard.html">Leaderboard</a></li>

    </ul>

</nav>

<main class="container">

    <div class="page-title">

        <h2>Create Tournament</h2>

    </div>

    <form id="tournamentForm">

        <div class="form-group">

            <label for="name">Tournament Name</label>

            <input
                type="text"
                id="name"
                required>

        </div>

        <div class="form-group">

            <label for="maxPlayers">Maximum Players</label>

            <input
                type="number"
                id="maxPlayers"
                required>

        </div>

        <button
            type="submit"
            class="btn">

            Create Tournament

        </button>

    </form>

    <br>

    <div class="page-title">

        <h2>Tournament List</h2>

    </div>

    <table>

        <thead>

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Capacity</th>

            <th>Created At</th>

            <th>Actions</th>

        </tr>

        </thead>

        <tbody id="tournamentTable">

        </tbody>

    </table>

</main>

<footer>

    <p>

        © 2026 Tournament Registration System

    </p>

</footer>

<script src="../js/api.js"></script>

<script src="../js/tournaments.js"></script>

</body>

</html>

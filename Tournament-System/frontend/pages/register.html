<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Registration</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header class="header">

    <div class="container">

        <h1>Tournament Registration System</h1>

        <p>Register Players Into Tournaments</p>

    </div>

</header>

<nav class="navbar">

    <ul>

        <li><a href="../index.html">Dashboard</a></li>

        <li><a href="players.html">Players</a></li>

        <li><a href="tournaments.html">Tournaments</a></li>

        <li><a class="active" href="register.html">Registration</a></li>

        <li><a href="scores.html">Scores</a></li>

        <li><a href="leaderboard.html">Leaderboard</a></li>

    </ul>

</nav>

<main class="container">

    <div class="page-title">

        <h2>Player Registration</h2>

    </div>

    <form id="registrationForm">

        <div class="form-group">

            <label for="tournamentSelect">Tournament</label>

            <select id="tournamentSelect" required>

                <option value="">Select Tournament</option>

            </select>

        </div>

        <div class="form-group">

            <label for="playerSelect">Player</label>

            <select id="playerSelect" required>

                <option value="">Select Player</option>

            </select>

        </div>

        <button class="btn" type="submit">

            Register Player

        </button>

    </form>

    <div id="statusCard" class="status-card">

        Select a tournament and player to register.

    </div>

</main>

<footer>

    <p>© 2026 Tournament Registration System</p>

</footer>

<script src="../js/api.js"></script>

<script src="../js/registration.js"></script>

</body>

</html>
